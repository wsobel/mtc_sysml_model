<div class="feedback-wrapper">
  <button id="feedback-btn" class="feedback-btn">Comment</button>
  <div id="feedback-panel" class="feedback-panel">
    <h4>Submit Comment</h4>
    <input type="text" id="feedback-subject" placeholder="Subject"/>
    <textarea id="feedback-text" rows="5"></textarea>
    <br/>
    <button id="feedback-submit">Send</button>
    <button id="feedback-cancel">Cancel</button>
    <span id="feedback-status"></span>
  </div>
</div>
